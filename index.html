<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Finanzas">
  <meta name="description" content="Registro financiero personal rápido">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./favicon.ico" sizes="any">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="icon" href="./icon-32.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <title>Finanzas</title>

  <!-- Firebase SDK (compat mode, sin bundler) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    /* ===== TOKENS ===== */
    :root {
      color-scheme: dark;
      --bg:          #0C0D11;
      --surface:     #13141A;
      --surface-2:   #1C1E28;
      --border:      #22242F;
      --t1:          #EEEEF5;
      --t2:          #7A7C8E;
      --t3:          #3A3C4A;
      --accent:      #4ECBA0;
      --accent-lt:   #0C2219;
      --income:      #3ECF8E;
      --income-lt:   #0B201A;
      --expense:     #E8414B;
      --expense-lt:  #26100F;
      --r:           14px;
      --r-sm:        10px;
      --sh:          0 2px 12px rgba(0,0,0,0.45);
      --nav-h:       64px;
    }

    /* ===== RESET ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    html { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100dvh;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    button { cursor: pointer; font-family: inherit; }

    /* ===== LOADING SCREEN ===== */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 600;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== LOGIN SCREEN ===== */
    #login-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 28px;
      z-index: 500;
    }
    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 28px 36px;
      text-align: center;
      box-shadow: 0 8px 48px rgba(0,0,0,0.7);
    }
    .login-logo {
      width: 72px; height: 72px;
      background: var(--accent-lt);
      border: 1px solid rgba(78,203,160,0.2);
      border-radius: 22px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-title {
      font-size: 26px;
      font-weight: 760;
      letter-spacing: -0.5px;
      color: var(--t1);
      margin-bottom: 10px;
    }
    .login-sub {
      font-size: 14px;
      color: var(--t2);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn-google {
      width: 100%;
      padding: 14px 20px;
      background: var(--surface-2);
      color: var(--t1);
      border: 1px solid var(--border);
      border-radius: var(--r);
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.15s;
    }
    .btn-google:hover  { border-color: var(--accent); }
    .btn-google:active { opacity: 0.7; }
    .login-note {
      font-size: 12px;
      color: var(--t3);
      margin-top: 20px;
      line-height: 1.5;
    }

    /* ===== USER AVATAR ===== */
    .user-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--accent-lt);
      border: 1.5px solid rgba(78,203,160,0.3);
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .user-avatar:active { opacity: 0.65; }
    .user-avatar--inv {
      background: var(--accent-lt);
      border-color: rgba(78,203,160,0.3);
      color: var(--accent);
    }

    /* ===== VIEWS ===== */
    .view {
      display: none;
      min-height: 100dvh;
      min-height: 100vh;
      padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px));
    }
    .view.active { display: block; }

    /* ===== PAGE HEADER ===== */
    .page-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 52px 20px 18px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
    }
    .page-title {
      font-size: 22px;
      font-weight: 760;
      letter-spacing: -0.4px;
      color: var(--t1);
    }
    .page-sub {
      font-size: 13px;
      color: var(--t2);
      margin-top: 2px;
    }

    /* ===== FORM ===== */
    .form-body {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .field { display: flex; flex-direction: column; gap: 8px; }
    label {
      font-size: 12px;
      font-weight: 700;
      color: var(--t2);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    input[type="date"],
    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      font-size: 16px;
      color: var(--t1);
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
      appearance: none;
      color-scheme: dark;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--t3); }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"] { -moz-appearance: textfield; }

    /* ===== SEGMENT (Ingreso / Gasto) ===== */
    .segment {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--surface-2);
      border-radius: var(--r-sm);
      padding: 4px;
      gap: 4px;
      border: 1.5px solid var(--border);
    }
    .segment-btn {
      padding: 13px 8px;
      border: none;
      background: transparent;
      border-radius: 7px;
      font-size: 15px;
      font-weight: 600;
      color: var(--t2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.18s, color 0.18s;
      user-select: none;
    }
    .segment-btn:active { opacity: 0.7; }
    .segment-btn.active.ingreso {
      background: var(--income-lt);
      color: var(--income);
    }
    .segment-btn.active.gasto {
      background: var(--expense-lt);
      color: var(--expense);
    }

    /* ===== PILL GROUP (métodos de pago) ===== */
    .pill-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill-btn {
      padding: 10px 16px;
      border: 1.5px solid var(--border);
      background: var(--surface-2);
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      color: var(--t2);
      transition: all 0.15s;
      white-space: nowrap;
      user-select: none;
    }
    .pill-btn:active { opacity: 0.65; }
    .pill-btn.active {
      background: var(--accent-lt);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ===== CTA BUTTONS ===== */
    .btn-primary {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #07150F;
      border: none;
      border-radius: var(--r);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.1px;
      transition: opacity 0.15s, transform 0.1s;
      user-select: none;
    }
    .btn-primary:active  { opacity: 0.82; transform: scale(0.98); }
    .btn-primary:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
    }
    .btn-ghost {
      width: 100%;
      padding: 14px;
      background: transparent;
      color: var(--t2);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      font-size: 15px;
      font-weight: 500;
      transition: all 0.15s;
      user-select: none;
    }
    .btn-ghost:active { opacity: 0.65; }

    /* ===== ERROR ===== */
    .error-msg {
      display: none;
      background: var(--expense-lt);
      color: var(--expense);
      border: 1px solid #3D1012;
      border-radius: var(--r-sm);
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 500;
    }

    /* ===== HISTORIAL BALANCE HEADER ===== */
    .balance-header {
      background: var(--bg);
      padding: 52px 20px 24px;
      border-bottom: 1px solid var(--border);
    }
    .balance-header-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
    }
    .balance-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--t2);
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }
    /* Signature: número enorme en blanco sobre negro */
    .balance-num {
      font-size: 44px;
      font-weight: 800;
      letter-spacing: -2px;
      margin-top: 6px;
      line-height: 1;
      color: var(--t1);
      transition: color 0.3s;
    }
    .balance-num.neg { color: var(--expense); }

    /* Mini summary cards */
    .summary-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 14px 16px 4px;
    }
    .s-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 13px 14px;
    }
    .s-card-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .s-card-label.inc { color: var(--income); }
    .s-card-label.exp { color: var(--expense); }
    .s-card-amount {
      font-size: 15px;
      font-weight: 700;
      color: var(--t1);
      margin-top: 4px;
      letter-spacing: -0.3px;
    }

    /* ===== SECTION DIVIDERS ===== */
    .section-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 18px 16px 8px;
    }
    .section-lbl {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: var(--t3);
      white-space: nowrap;
    }
    .section-rule { flex: 1; height: 1px; background: var(--border); }

    /* ===== RECORD LIST ===== */
    .rec-list {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 4px;
    }
    .rec-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 13px 12px 13px 14px;
      display: flex;
      align-items: center;
      gap: 11px;
    }
    .rec-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .rec-dot.ingreso { background: var(--income); }
    .rec-dot.gasto   { background: var(--expense); }
    .rec-info { flex: 1; min-width: 0; }
    .rec-desc {
      font-size: 14px;
      font-weight: 600;
      color: var(--t1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rec-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 3px;
    }
    .rec-fecha  { font-size: 12px; color: var(--t3); }
    .rec-method {
      font-size: 11px;
      color: var(--t2);
      background: var(--surface-2);
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 500;
    }
    .rec-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }
    .rec-monto { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; }
    .rec-monto.ingreso { color: var(--income); }
    .rec-monto.gasto   { color: var(--expense); }
    .rec-actions { display: flex; gap: 4px; }
    .icon-btn {
      width: 30px; height: 30px;
      border: none;
      background: var(--surface-2);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--t3);
      transition: all 0.15s;
    }
    .icon-btn:active { opacity: 0.55; }
    .edit-btn:hover { color: var(--accent);  background: var(--accent-lt); }
    .del-btn:hover  { color: var(--expense); background: var(--expense-lt); }
    /* Check de exportado a Excel */
    .check-btn {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      color: transparent;
      padding: 0;
    }
    .check-btn:active { opacity: 0.65; }
    .check-btn.checked {
      background: var(--income);
      border-color: var(--income);
      color: #07150F;
    }
    .rec-card.exportado {
      opacity: 0.42;
    }
    .rec-card.exportado .rec-desc {
      text-decoration: line-through;
      text-decoration-color: var(--t3);
    }
    .empty-state {
      text-align: center;
      padding: 22px 16px;
      font-size: 13px;
      color: var(--t3);
    }

    /* ===== BOTTOM NAV ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px));
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr 1fr;
      z-index: 100;
    }
    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      border: none;
      background: none;
      color: var(--t3);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1px;
      transition: color 0.15s;
      padding: 8px 0;
    }
    .nav-btn.active { color: var(--accent); }
    .nav-btn svg { width: 22px; height: 22px; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px) + 14px);
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--t1);
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
      white-space: nowrap;
      z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- ══════════════════════════════════
     PANTALLA DE CARGA (mientras Firebase inicia)
     ══════════════════════════════════ -->
<div id="loading-screen">
  <div class="spinner"></div>
</div>

<!-- ══════════════════════════════════
     PANTALLA DE LOGIN
     ══════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">

    <!-- Ícono de la app -->
    <div class="login-logo">
      <svg width="36" height="36" viewBox="0 0 192 192" fill="none">
        <polygon points="96,44 57,100 135,100" fill="white"/>
        <rect x="81" y="99" width="30" height="50" fill="white"/>
      </svg>
    </div>

    <div class="login-title">Finanzas</div>
    <div class="login-sub">Inicia sesión para sincronizar tus registros entre el celular y el PC en tiempo real.</div>

    <!-- Botón Google -->
    <button class="btn-google" onclick="signIn()">
      <!-- Ícono de Google -->
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continuar con Google
    </button>

    <p class="login-note">Tus datos se guardan en tu cuenta de Google Firebase y solo tú puedes acceder a ellos.</p>
  </div>
</div>


<!-- ══════════════════════════════════
     APP (visible después del login)
     ══════════════════════════════════ -->
<div id="app-wrapper" style="display:none">

  <!-- ── VISTA: FORMULARIO ── -->
  <section id="view-form" class="view active">
    <div class="page-header">
      <div>
        <div class="page-title" id="form-title">Nuevo registro</div>
        <div class="page-sub"   id="form-sub">Anota rápido antes de olvidar</div>
      </div>
      <button class="user-avatar" onclick="signOut()" title="Cerrar sesión">
        <span class="user-initial"></span>
      </button>
    </div>

    <div class="form-body">

      <div id="error-msg" class="error-msg"></div>

      <div class="field">
        <label for="fecha">Fecha</label>
        <input type="date" id="fecha">
      </div>

      <div class="field">
        <label for="desc">Descripción</label>
        <input type="text" id="desc" placeholder="¿En qué?" autocomplete="off" autocorrect="off" spellcheck="false">
      </div>

      <div class="field">
        <label for="monto">Monto</label>
        <input type="number" id="monto" placeholder="0" inputmode="decimal" min="0" step="any">
      </div>

      <div class="field">
        <label>Tipo</label>
        <div class="segment">
          <button class="segment-btn ingreso" data-tipo="ingreso" onclick="selectTipo('ingreso')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
            </svg>
            Ingreso
          </button>
          <button class="segment-btn gasto" data-tipo="gasto" onclick="selectTipo('gasto')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/>
            </svg>
            Gasto
          </button>
        </div>
      </div>

      <div class="field">
        <label>Método de pago</label>
        <div class="pill-group">
          <button class="pill-btn" data-metodo="efectivo"       onclick="selectMetodo('efectivo')">Efectivo</button>
          <button class="pill-btn" data-metodo="debito"         onclick="selectMetodo('debito')">Débito</button>
          <button class="pill-btn" data-metodo="tc-bancolombia" onclick="selectMetodo('tc-bancolombia')">TC Bancolombia</button>
          <button class="pill-btn" data-metodo="tc-nu"          onclick="selectMetodo('tc-nu')">TC Nu</button>
          <button class="pill-btn" data-metodo="tc-lulo"        onclick="selectMetodo('tc-lulo')">TC Lulo</button>
        </div>
      </div>

      <button class="btn-primary" id="guardar-btn" onclick="guardar()">Guardar registro</button>
      <button class="btn-ghost"   id="cancel-btn"  onclick="cancelEdit()" style="display:none">Cancelar edición</button>

    </div>
  </section>


  <!-- ── VISTA: HISTORIAL ── -->
  <section id="view-historial" class="view">

    <div class="balance-header">
      <div class="balance-header-row">
        <div>
          <div class="balance-label">Balance total</div>
          <div class="balance-num" id="balance">$ 0</div>
        </div>
        <button class="user-avatar user-avatar--inv" onclick="signOut()" title="Cerrar sesión">
          <span class="user-initial"></span>
        </button>
      </div>
    </div>

    <div class="summary-row">
      <div class="s-card">
        <div class="s-card-label inc">Ingresos</div>
        <div class="s-card-amount" id="total-ingresos">$ 0</div>
      </div>
      <div class="s-card">
        <div class="s-card-label exp">Gastos</div>
        <div class="s-card-amount" id="total-gastos">$ 0</div>
      </div>
    </div>

    <div>
      <div class="section-head">
        <span class="section-lbl">Ingresos</span>
        <div class="section-rule"></div>
      </div>
      <div class="rec-list" id="lista-ingresos"></div>
    </div>

    <div>
      <div class="section-head">
        <span class="section-lbl">Gastos</span>
        <div class="section-rule"></div>
      </div>
      <div class="rec-list" id="lista-gastos"></div>
    </div>

  </section>


  <!-- ── BOTTOM NAV ── -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-form" onclick="switchView('form')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      Registrar
    </button>
    <button class="nav-btn" id="nav-historial" onclick="switchView('historial')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="6"  x2="21" y2="6"/>
        <line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6"  x2="3.01" y2="6"/>
        <line x1="3" y1="12" x2="3.01" y2="12"/>
        <line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      Historial
    </button>
  </nav>

</div><!-- /app-wrapper -->

<!-- TOAST (fuera del wrapper para que siempre sea visible) -->
<div class="toast" id="toast"></div>


<!-- ══════════════════════════════════════════════════════════
     JAVASCRIPT
     ══════════════════════════════════════════════════════════ -->
<script>
'use strict';

/* ════════════════════════════════════════════════
   ⚙️  PASO 4 de la guía: reemplaza estos valores
       con los de tu proyecto Firebase.
   ════════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey:            "AIzaSyCBMDR_4eS_5OmEqHm_FgDUj00modiwMlg",
  authDomain:        "finanzas-personal-2026.firebaseapp.com",
  projectId:         "finanzas-personal-2026",
  storageBucket:     "finanzas-personal-2026.firebasestorage.app",
  messagingSenderId: "870312850864",
  appId:             "1:870312850864:web:75f920beb48aa6cafed275"
};
/* ════════════════════════════════════════════════ */


/* ── Guarda de configuración ──
   Si el usuario aún no pegó sus credenciales, muestra aviso en lugar
   de intentar conectarse a Firebase con valores inválidos.          */
if (firebaseConfig.apiKey === 'REEMPLAZAR') {
  document.getElementById('loading-screen').innerHTML =
    '<div style="font-family:-apple-system,sans-serif;text-align:center;padding:40px 24px;max-width:300px">' +
    '<div style="font-size:52px;margin-bottom:16px">⚙️</div>' +
    '<p style="font-weight:700;font-size:18px;margin-bottom:10px;color:#18192B">Firebase pendiente</p>' +
    '<p style="color:#6B6D82;font-size:14px;line-height:1.6">' +
    'Abre <code style="background:#F1F2F6;padding:2px 6px;border-radius:4px">index.html</code> ' +
    'y reemplaza los valores de <code style="background:#F1F2F6;padding:2px 6px;border-radius:4px">firebaseConfig</code> ' +
    'con los de tu proyecto.<br><br>Sigue la guía de instalación paso a paso.</p></div>';
} else {
  initApp();
}


function initApp() {

  /* ── Firebase init ── */
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  /* Persistencia offline: Firestore cachea datos localmente en IndexedDB.
     La app funciona sin conexión después de la primera carga con sesión.  */
  db.enablePersistence({ synchronizeTabs: true })
    .catch(err => console.warn('Persistencia offline:', err.code));


  /* ═══ ESTADO ═══ */
  let records    = [];
  let currentUser = null;
  let unsub       = null;   // cleanup del listener de Firestore
  let selTipo     = null;
  let selMetod    = null;
  let editId      = null;
  let activeView  = 'form';


  /* ═══ AUTH ═══ */
  function signIn() {
    auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
      .catch(err => {
        console.error('Sign-in error:', err);
        alert('No se pudo iniciar sesión. Intenta de nuevo.');
      });
  }

  function signOut() {
    if (!confirm('¿Cerrar sesión en este dispositivo?')) return;
    auth.signOut();
  }

  /* Exponer al scope global para los onclick del HTML */
  window.signIn  = signIn;
  window.signOut = signOut;

  auth.onAuthStateChanged(user => {
    document.getElementById('loading-screen').style.display = 'none';

    if (user) {
      currentUser = user;

      /* Poner la inicial del usuario en los dos avatares */
      const ini = (user.displayName || user.email || 'U').charAt(0).toUpperCase();
      document.querySelectorAll('.user-initial').forEach(el => el.textContent = ini);

      document.getElementById('login-screen').style.display  = 'none';
      document.getElementById('app-wrapper').style.display   = 'block';

      resetForm();
      switchView('form');
      setupListener(user.uid);

    } else {
      currentUser = null;
      if (unsub) { unsub(); unsub = null; }
      records = [];

      document.getElementById('login-screen').style.display  = 'flex';
      document.getElementById('app-wrapper').style.display   = 'none';
    }
  });


  /* ═══ FIRESTORE LISTENER (tiempo real) ═══ */
  function setupListener(uid) {
    if (unsub) unsub(); /* cancelar listener anterior si lo hubiera */

    unsub = db
      .collection('users').doc(uid).collection('registros')
      .onSnapshot(
        snap => {
          records = snap.docs.map(doc => {
            const d = doc.data();
            return {
              id:     doc.id,
              fecha:  d.fecha  || '',
              desc:   d.desc   || '',
              monto:  d.monto  || 0,
              tipo:   d.tipo   || '',
              metodo: d.metodo || '',
              /* ts puede ser null en escrituras pendientes (offline) */
              ts:        d.ts?.toMillis?.() ?? d.ts ?? 0,
              exportado: d.exportado ?? false
            };
          });
          if (activeView === 'historial') renderHistorial();
        },
        err => console.error('Firestore listener:', err)
      );
  }


  /* ═══ GUARDAR / ACTUALIZAR ═══ */
  async function guardar() {
    const fecha = document.getElementById('fecha').value;
    const desc  = document.getElementById('desc').value.trim();
    const raw   = document.getElementById('monto').value;
    const monto = parseFloat(raw);

    if (!fecha)                             return showErr('Selecciona la fecha.');
    if (!desc)                              return showErr('Escribe una descripción.');
    if (!raw || isNaN(monto) || monto <= 0) return showErr('Ingresa un monto válido (mayor que 0).');
    if (!selTipo)                           return showErr('Selecciona Ingreso o Gasto.');
    if (!selMetod)                          return showErr('Selecciona el método de pago.');
    if (!currentUser)                       return showErr('Sesión expirada. Recarga la app.');

    const uid  = currentUser.uid;
    const data = { fecha, desc, monto, tipo: selTipo, metodo: selMetod };

    setSaving(true);
    try {
      if (editId) {
        await db.collection('users').doc(uid).collection('registros').doc(editId).update(data);
        showToast('✓ Registro actualizado');
      } else {
        data.ts = firebase.firestore.FieldValue.serverTimestamp();
        await db.collection('users').doc(uid).collection('registros').add(data);
        showToast('✓ Guardado');
      }
      resetForm();
    } catch (err) {
      console.error('Save error:', err);
      showErr('Error al guardar. Verifica tu conexión.');
    } finally {
      setSaving(false);
    }
  }

  function setSaving(on) {
    const btn = document.getElementById('guardar-btn');
    btn.disabled    = on;
    btn.textContent = on
      ? (editId ? 'Actualizando...' : 'Guardando...')
      : (editId ? 'Actualizar registro' : 'Guardar registro');
  }


  /* ═══ ELIMINAR ═══ */
  async function delRec(id) {
    const r = records.find(r => r.id === id);
    if (!r || !confirm(`¿Eliminar "${r.desc}"?`)) return;
    try {
      await db.collection('users').doc(currentUser.uid).collection('registros').doc(id).delete();
      /* onSnapshot actualiza records automáticamente */
    } catch (err) {
      console.error('Delete error:', err);
      showErr('Error al eliminar. Intenta de nuevo.');
    }
  }


  /* ═══ EDITAR ═══ */
  function editRec(id) {
    const r = records.find(r => r.id === id);
    if (!r) return;
    editId   = id;
    selTipo  = r.tipo;
    selMetod = r.metodo;
    document.getElementById('fecha').value  = r.fecha;
    document.getElementById('desc').value   = r.desc;
    document.getElementById('monto').value  = r.monto;
    syncBtns();
    document.getElementById('form-title').textContent   = 'Editar registro';
    document.getElementById('form-sub').textContent     = 'Modifica y guarda los cambios';
    document.getElementById('guardar-btn').textContent  = 'Actualizar registro';
    document.getElementById('cancel-btn').style.display = 'block';
    switchView('form');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function cancelEdit() { resetForm(); }


  /* ═══ FORMULARIO ═══ */
  function resetForm() {
    document.getElementById('fecha').value  = todayStr();
    document.getElementById('desc').value   = '';
    document.getElementById('monto').value  = '';
    selTipo  = null;
    selMetod = null;
    editId   = null;
    syncBtns();
    hideErr();
    document.getElementById('form-title').textContent      = 'Nuevo registro';
    document.getElementById('form-sub').textContent        = 'Anota rápido antes de olvidar';
    document.getElementById('guardar-btn').textContent     = 'Guardar registro';
    document.getElementById('guardar-btn').disabled        = false;
    document.getElementById('cancel-btn').style.display   = 'none';
  }

  function syncBtns() {
    document.querySelectorAll('.segment-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.tipo === selTipo));
    document.querySelectorAll('.pill-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.metodo === selMetod));
  }

  function selectTipo(v)   { selTipo  = v; syncBtns(); }
  function selectMetodo(v) { selMetod = v; syncBtns(); }


  /* ═══ HISTORIAL ═══ */
  function renderHistorial() {
    const ingresos = records
      .filter(r => r.tipo === 'ingreso')
      .sort((a, b) => b.fecha.localeCompare(a.fecha) || b.ts - a.ts);
    const gastos = records
      .filter(r => r.tipo === 'gasto')
      .sort((a, b) => b.fecha.localeCompare(a.fecha) || b.ts - a.ts);

    const totI = ingresos.reduce((s, r) => s + r.monto, 0);
    const totG = gastos.reduce((s, r)   => s + r.monto, 0);
    const bal  = totI - totG;

    const balEl = document.getElementById('balance');
    balEl.textContent = fmtCOP(bal);
    balEl.className   = 'balance-num' + (bal < 0 ? ' neg' : '');
    document.getElementById('total-ingresos').textContent = fmtCOP(totI);
    document.getElementById('total-gastos').textContent   = fmtCOP(totG);

    renderList('lista-ingresos', ingresos, 'ingreso');
    renderList('lista-gastos',   gastos,   'gasto');
  }

  function renderList(cId, list, tipo) {
    const el = document.getElementById(cId);
    if (!list.length) {
      el.innerHTML = '<div class="empty-state">Sin registros todavía</div>';
      return;
    }
    el.innerHTML = list.map(r => `
      <div class="rec-card${r.exportado ? ' exportado' : ''}">
        <button class="check-btn${r.exportado ? ' checked' : ''}"
                onclick="toggleCheck('${esc(r.id)}', ${r.exportado})"
                title="${r.exportado ? 'Quitar marca' : 'Marcar como exportado a Excel'}">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </button>
        <div class="rec-dot ${tipo}"></div>
        <div class="rec-info">
          <div class="rec-desc">${esc(r.desc)}</div>
          <div class="rec-meta">
            <span class="rec-fecha">${fmtDate(r.fecha)}</span>
            <span class="rec-method">${esc(M_LABELS[r.metodo] || r.metodo)}</span>
          </div>
        </div>
        <div class="rec-right">
          <div class="rec-monto ${tipo}">${fmtCOP(r.monto)}</div>
          <div class="rec-actions">
            <button class="icon-btn edit-btn" onclick="editRec('${esc(r.id)}')" aria-label="Editar">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>
            <button class="icon-btn del-btn" onclick="delRec('${esc(r.id)}')" aria-label="Eliminar">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
                <path d="M10 11v6M14 11v6"/>
                <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    `).join('');
  }


  /* ═══ NAVEGACIÓN ═══ */
  function switchView(v) {
    activeView = v;
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('view-' + v).classList.add('active');
    document.getElementById('nav-'  + v).classList.add('active');
    if (v === 'historial') renderHistorial();
  }


  /* ═══ UTILIDADES ═══ */
  function todayStr() {
    const d = new Date();
    return [
      d.getFullYear(),
      String(d.getMonth() + 1).padStart(2, '0'),
      String(d.getDate()).padStart(2, '0')
    ].join('-');
  }

  function fmtCOP(n) {
    return new Intl.NumberFormat('es-CO', {
      style: 'currency', currency: 'COP',
      minimumFractionDigits: 0, maximumFractionDigits: 0
    }).format(n);
  }

  function fmtDate(s) {
    const [y, m, d] = s.split('-').map(Number);
    return new Date(y, m - 1, d).toLocaleDateString('es-CO', {
      day: '2-digit', month: 'short', year: 'numeric'
    });
  }

  const M_LABELS = {
    'efectivo': 'Efectivo', 'debito': 'Débito',
    'tc-bancolombia': 'TC Bancolombia', 'tc-nu': 'TC Nu', 'tc-lulo': 'TC Lulo'
  };

  function esc(s) {
    return String(s).replace(/[&<>"']/g,
      c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    clearTimeout(toastTimer);
    t.textContent = msg;
    t.classList.add('show');
    toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
  }

  function showErr(msg) {
    const e = document.getElementById('error-msg');
    e.textContent = msg;
    e.style.display = 'block';
  }
  function hideErr() {
    document.getElementById('error-msg').style.display = 'none';
  }


  /* ═══ Exponer funciones al scope global (necesario para los onclick inline) ═══ */
  /* ═══ MARCAR COMO EXPORTADO A EXCEL ═══ */
  async function toggleCheck(id, isChecked) {
    try {
      await db.collection('users').doc(currentUser.uid)
        .collection('registros').doc(id)
        .update({ exportado: !isChecked });
    } catch (err) {
      console.error('toggleCheck:', err);
    }
  }

  window.selectTipo    = selectTipo;
  window.selectMetodo  = selectMetodo;
  window.guardar       = guardar;
  window.cancelEdit    = cancelEdit;
  window.editRec       = editRec;
  window.delRec        = delRec;
  window.switchView    = switchView;
  window.toggleCheck   = toggleCheck;


  /* ═══ SERVICE WORKER ═══ */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(console.warn);
    });
  }

} /* fin initApp() */
</script>
</body>
</html>
